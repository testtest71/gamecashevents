<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Appariements - Tournoi</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    
    <style>
        /* CODE COULEUR ET DESIGN */
        :root {
            --bg-black: #000000;
            --text-white: #ffffff;
            --neon-green: #20C034; /* Vert inspiré de ton logo */
            --dark-gray: #1a1a1a;
        }

        body { 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            background-color: var(--bg-black);
            color: var(--text-white);
            margin: 0;
            padding: 0;
            text-align: center;
        }

        /* LOGO */
        .header-logo {
            max-width: 300px; /* Taille ajustable */
            width: 80%;
            margin: 30px auto;
            display: block;
        }

        /* BARRE DE NAVIGATION */
        nav {
            background-color: var(--dark-gray);
            padding: 15px 0;
            border-top: 2px solid var(--neon-green);
            border-bottom: 2px solid var(--neon-green);
            margin-bottom: 30px;
        }

        nav a {
            color: var(--text-white);
            text-decoration: none;
            margin: 0 15px;
            font-size: 1.1em;
            font-weight: bold;
            text-transform: uppercase;
            transition: color 0.3s ease;
        }

        nav a:hover {
            color: var(--neon-green);
        }

        /* Lien admin plus discret */
        nav a.admin-link {
            color: #555;
            font-size: 0.9em;
        }
        nav a.admin-link:hover {
            color: var(--text-white);
        }

        /* TABLEAUX GÉNÉRÉS PAR TOM */
        #pairings-container {
            width: 95%;
            max-width: 800px;
            margin: 0 auto;
            overflow-x: auto; /* Permet de scroller sur téléphone si le tableau est large */
        }

        table.report { 
            border-collapse: collapse; 
            width: 100%; 
            background-color: var(--dark-gray);
            box-shadow: 0 0 10px rgba(32, 192, 52, 0.2);
        }

        table.report th, table.report td { 
            border: 1px solid var(--neon-green); 
            padding: 12px; 
            text-align: center; 
        }

        table.report th { 
            background-color: #0d0d0d; 
            color: var(--neon-green);
            font-size: 1.1em;
        }

        table.report tr:nth-child(even) {
            background-color: #111111;
        }
    </style>
</head>
<body>

    <img src="logo.png" alt="Gamecash Gaming & Culture Geek" class="header-logo">

    <nav>
        <a href="index.html" style="color: var(--neon-green);">Appariements</a>
        <a href="standings.html">Classement</a>
        <a href="top8.html">Top 8</a>
        <a href="admin.html" class="admin-link">Admin</a>
    </nav>

    <h2 style="color: var(--neon-green);">Appariements du Round en cours</h2>
    
    <div id="pairings-container">
        <p>Chargement des appariements en cours...</p>
    </div>

    <script>
        // Ta configuration Firebase
        const firebaseConfig = {
            apiKey: "AIzaSyA021XaX6w_0q7UV6k3irVnfsFTM75hlsk",
            databaseURL: "https://tcg-hub-6718c-default-rtdb.europe-west1.firebasedatabase.app/",
            projectId: "tcg-hub-6718c"
        };
        
        if (!firebase.apps.length) {
            firebase.initializeApp(firebaseConfig);
        }
        const db = firebase.database();

        // Écoute en temps réel les changements sur la branche 'tournoi/pairings'
        db.ref('tournoi/pairings').on('value', (snapshot) => {
            const data = snapshot.val();
            if (data) {
                document.getElementById('pairings-container').innerHTML = data;
            } else {
                document.getElementById('pairings-container').innerHTML = "<p>Aucun appariement disponible pour le moment.</p>";
            }
        });
    </script>
</body>
</html>
