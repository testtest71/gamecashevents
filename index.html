<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Appariements - Tournoi</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    
    <style>
        /* CODE COULEUR ET DESIGN */
        :root {
            --bg-black: #000000;
            --text-white: #ffffff;
            --neon-green: #20C034;
            --dark-gray: #1a1a1a;
        }

        body { 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            background-color: var(--bg-black);
            color: var(--text-white);
            margin: 0;
            padding: 0;
            text-align: center;
        }

        .header-logo {
            max-width: 300px;
            width: 80%;
            margin: 30px auto;
            display: block;
        }

        nav {
            background-color: var(--dark-gray);
            padding: 15px 0;
            border-top: 2px solid var(--neon-green);
            border-bottom: 2px solid var(--neon-green);
            margin-bottom: 30px;
        }

        nav a {
            color: var(--text-white);
            text-decoration: none;
            margin: 0 15px;
            font-size: 1.1em;
            font-weight: bold;
            text-transform: uppercase;
            transition: color 0.3s ease;
        }

        nav a:hover { color: var(--neon-green); }
        nav a.admin-link { color: #555; font-size: 0.9em; }
        nav a.admin-link:hover { color: var(--text-white); }

        #pairings-container {
            width: 95%;
            max-width: 900px;
            margin: 0 auto 40px auto;
            overflow-x: auto;
        }

        table.report { 
            border-collapse: collapse; 
            width: 100%; 
            background-color: var(--dark-gray);
            box-shadow: 0 0 10px rgba(32, 192, 52, 0.2);
        }

        table.report th, table.report td { 
            border: 1px solid var(--neon-green); 
            padding: 12px; 
            text-align: center; 
        }

        table.report th { 
            background-color: #0d0d0d; 
            color: var(--neon-green);
            font-size: 1.1em;
        }

        table.report tr:nth-child(even) {
            background-color: #111111;
        }

        .vs-text {
            color: var(--neon-green);
            font-weight: bold;
            font-size: 0.9em;
        }

        /* --- RESPONSIVE MOBILE (Téléphones) --- */
        @media (max-width: 600px) {
            /* On cache l'en-tête classique du tableau */
            table.report thead {
                display: none;
            }
            
            /* On force les éléments du tableau à s'empiler en blocs */
            table.report, table.report tbody, table.report tr, table.report td {
                display: block;
                width: 100%;
                box-sizing: border-box;
            }

            /* Chaque match devient une "carte" */
            table.report tr {
                margin-bottom: 20px;
                border: 2px solid var(--neon-green);
                border-radius: 8px;
                padding: 0;
                overflow: hidden;
            }

            /* On retire les bordures internes par défaut */
            table.report td {
                border: none;
                padding: 10px;
            }

            /* Style du numéro de Table en haut de la carte */
            table.report td:nth-child(1) {
                background-color: #0d0d0d;
                color: var(--neon-green);
                font-size: 1.2em;
                border-bottom: 1px solid #333;
            }
            
            /* On rajoute le mot "Table" automatiquement devant le numéro */
            table.report td:nth-child(1)::before {
                content: "Table ";
            }

            /* Style du "VS" au milieu */
            table.report td:nth-child(3) {
                padding: 5px 0;
                font-size: 1.1em;
                color: #555;
            }

            /* Style pour les joueurs (on s'assure que le texte passe à la ligne si besoin) */
            table.report td:nth-child(2), 
            table.report td:nth-child(4) {
                word-wrap: break-word;
                white-space: normal;
                font-size: 1.1em;
            }
        }
    </style>
</head>
<body>

    <img src="logo.png" alt="Gamecash Gaming & Culture Geek" class="header-logo">

    <nav>
        <a href="index.html" style="color: var(--neon-green);">Appariements</a>
        <a href="standings.html">Classement</a>
        <a href="top8.html">Top 8</a>
        <a href="admin.html" class="admin-link">Admin</a>
    </nav>

    <h2 style="color: var(--neon-green);">Appariements du Round en cours</h2>
    
    <div id="pairings-container">
        <p>Chargement des appariements en cours...</p>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyA021XaX6w_0q7UV6k3irVnfsFTM75hlsk",
            databaseURL: "https://tcg-hub-6718c-default-rtdb.europe-west1.firebasedatabase.app/",
            projectId: "tcg-hub-6718c"
        };
        
        if (!firebase.apps.length) {
            firebase.initializeApp(firebaseConfig);
        }
        const db = firebase.database();

        db.ref('tournoi/pairings').on('value', (snapshot) => {
            const rawHtml = snapshot.val();
            
            if (rawHtml) {
                const parser = new DOMParser();
                const doc = parser.parseFromString(rawHtml, 'text/html');
                const originalTable = doc.querySelector('table');
                
                if (originalTable) {
                    const rows = originalTable.querySelectorAll('tr');
                    
                    const matches = new Map(); // Pour stocker les matchs uniques par numéro de table
                    const byes = []; // Pour stocker les joueurs en "Bye" séparément
                    
                    // On boucle sur toutes les lignes (en ignorant les en-têtes)
                    for (let i = 1; i < rows.length; i++) {
                        const cells = rows[i].querySelectorAll('td, th');
                        
                        if (cells.length >= 4) { 
                            const tableStr = cells[0].innerText.trim();
                            const player1 = cells[1].innerText.trim();
                            const player2 = cells[3].innerText.trim();
                            
                            // Si c'est un BYE
                            if (tableStr.toLowerCase() === 'bye') {
                                byes.push({ tableStr, player1, player2 });
                            } else {
                                // C'est une table numérotée
                                const tableNum = parseInt(tableStr, 10);
                                if (!isNaN(tableNum)) {
                                    // Si on n'a pas encore vu cette table, on l'enregistre (Dédoublonnage)
                                    if (!matches.has(tableNum)) {
                                        matches.set(tableNum, { tableNum, player1, player2 });
                                    }
                                }
                            }
                        }
                    }
                    
                    // On transforme les matchs en liste et on les trie de 1 à l'infini
                    let sortedMatches = Array.from(matches.values());
                    sortedMatches.sort((a, b) => a.tableNum - b.tableNum);
                    
                    // On prépare le HTML propre à afficher
                    let newTableHtml = '<table class="report"><thead><tr>';
                    newTableHtml += '<th>Table</th><th>Joueur 1</th><th></th><th>Joueur 2</th>';
                    newTableHtml += '</tr></thead><tbody>';
                    
                    // On ajoute les matchs triés
                    sortedMatches.forEach(match => {
                        newTableHtml += `<tr>
                            <td><strong>${match.tableNum}</strong></td>
                            <td>${match.player1}</td>
                            <td class="vs-text">VS</td>
                            <td>${match.player2}</td>
                        </tr>`;
                    });

                    // On ajoute les BYE à la toute fin du tableau
                    byes.forEach(bye => {
                        newTableHtml += `<tr>
                            <td style="color: #777;"><em>${bye.tableStr}</em></td>
                            <td>${bye.player1}</td>
                            <td></td>
                            <td>${bye.player2}</td>
                        </tr>`;
                    });
                    
                    newTableHtml += '</tbody></table>';
                    document.getElementById('pairings-container').innerHTML = newTableHtml;
                } else {
                    document.getElementById('pairings-container').innerHTML = "<p>Erreur lors de l'affichage des appariements.</p>";
                }
            } else {
                document.getElementById('pairings-container').innerHTML = "<p>Aucun appariement disponible pour le moment.</p>";
            }
        });
    </script>
</body>
</html>
